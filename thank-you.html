<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Arc Signage Co.</title>
<meta name="robots" content="noindex">
<style>
:root {
  --navy: #0b1d33;
  --gold: #d4a843;
  --paper: #f5f6f8;
  --white: #ffffff;
  --muted: #d8e1ec;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 28px;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, var(--navy), #1a3a5c);
  color: var(--white);
}
main {
  width: min(680px, 100%);
  border: 1px solid rgba(255,255,255,.16);
  border-top: 4px solid var(--gold);
  border-radius: 8px;
  padding: 34px;
  background: rgba(255,255,255,.08);
  box-shadow: 0 18px 44px rgba(0,0,0,.18);
}
.logo {
  color: var(--white);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: .08em;
  margin-bottom: 28px;
}
.logo span { color: var(--gold); }
h1 {
  font-size: clamp(34px, 6vw, 54px);
  line-height: 1;
  letter-spacing: -.04em;
  margin-bottom: 16px;
}
p {
  color: var(--muted);
  font-size: 18px;
  line-height: 1.5;
  margin-bottom: 24px;
}
a {
  display: inline-flex;
  align-items: center;
  min-height: 44px;
  padding: 12px 18px;
  border-radius: 8px;
  background: var(--gold);
  color: var(--navy);
  font-weight: 900;
  text-decoration: none;
}
</style>
</head>
<body>
<main>
  <div class="logo">ARC <span>SIGNAGE</span></div>
  <h1>Thank you.</h1>
  <p>Your quote request has been received. Arc Signage Co. will review the project details and follow up as soon as possible.</p>
  <a href="/">Back to homepage</a>
</main>
</body>
</html>
