<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">Arc Signage package lifecycle</title>
  <desc id="desc">Circular arc diagram showing the signage package path from intake to installation closeout, ending at install instead of repeating.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1d33"/>
      <stop offset="1" stop-color="#183756"/>
    </linearGradient>
    <filter id="softShadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0b1d33" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2 L11 7 L2 12 Z" fill="#d4a843"/>
    </marker>
  </defs>

  <rect width="920" height="760" rx="30" fill="url(#bg)"/>
  <rect x="30" y="30" width="860" height="700" rx="24" fill="#ffffff" stroke="#dfe5ee" stroke-width="3"/>

  <g transform="translate(62 58)" font-family="Arial, Helvetica, sans-serif">
    <text x="0" y="24" fill="#d4a843" font-size="18" font-weight="900" letter-spacing="3">ARC SIGNAGE CO.</text>
    <text x="0" y="70" fill="#0b1d33" font-size="44" font-weight="900">Signage Package Lifecycle</text>
    <text x="1" y="103" fill="#657287" font-size="18" font-weight="700">A clockwise project path from intake to field-ready closeout.</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <path d="M304 278 A205 205 0 0 1 616 278" fill="none" stroke="#d4a843" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M652 322 A205 205 0 0 1 652 506" fill="none" stroke="#d4a843" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M616 550 A205 205 0 0 1 304 550" fill="none" stroke="#d4a843" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M268 506 A205 205 0 0 1 268 322" fill="none" stroke="#d4a843" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M314 292 A188 188 0 0 1 433 229" fill="none" stroke="#d4a843" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>

    <g transform="translate(350 304)" filter="url(#softShadow)">
      <circle cx="110" cy="110" r="104" fill="url(#navy)" stroke="#d4a843" stroke-width="5"/>
      <circle cx="110" cy="110" r="76" fill="#102944" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
    </g>

    <g filter="url(#softShadow)">
      <g transform="translate(178 202)">
        <rect width="172" height="118" rx="16" fill="url(#navy)"/>
        <circle cx="32" cy="32" r="19" fill="#d4a843"/>
        <text x="32" y="40" text-anchor="middle" fill="#0b1d33" font-size="18" font-weight="900">1</text>
        <text x="26" y="72" fill="#ffffff" font-size="22" font-weight="900">Intake</text>
        <text x="26" y="99" fill="#cfdae8" font-size="14" font-weight="700">Scope, drawings, dates.</text>
      </g>

      <g transform="translate(374 154)">
        <rect width="172" height="118" rx="16" fill="#ffffff" stroke="#dfe5ee" stroke-width="3"/>
        <circle cx="32" cy="32" r="19" fill="#d4a843"/>
        <text x="32" y="40" text-anchor="middle" fill="#0b1d33" font-size="18" font-weight="900">2</text>
        <text x="26" y="72" fill="#0b1d33" font-size="22" font-weight="900">Survey</text>
        <text x="26" y="99" fill="#657287" font-size="14" font-weight="700">Field and access review.</text>
      </g>

      <g transform="translate(570 202)">
        <rect width="172" height="118" rx="16" fill="#ffffff" stroke="#dfe5ee" stroke-width="3"/>
        <circle cx="32" cy="32" r="19" fill="#d4a843"/>
        <text x="32" y="40" text-anchor="middle" fill="#0b1d33" font-size="18" font-weight="900">3</text>
        <text x="26" y="72" fill="#0b1d33" font-size="22" font-weight="900">Design</text>
        <text x="26" y="99" fill="#657287" font-size="14" font-weight="700">Artwork and drawings.</text>
      </g>

      <g transform="translate(612 420)">
        <rect width="172" height="118" rx="16" fill="#ffffff" stroke="#dfe5ee" stroke-width="3"/>
        <circle cx="32" cy="32" r="19" fill="#d4a843"/>
        <text x="32" y="40" text-anchor="middle" fill="#0b1d33" font-size="18" font-weight="900">4</text>
        <text x="26" y="72" fill="#0b1d33" font-size="22" font-weight="900">Approvals</text>
        <text x="26" y="99" fill="#657287" font-size="14" font-weight="700">DOB, FDNY, landlord.</text>
      </g>

      <g transform="translate(374 542)">
        <rect width="172" height="118" rx="16" fill="#ffffff" stroke="#dfe5ee" stroke-width="3"/>
        <circle cx="32" cy="32" r="19" fill="#d4a843"/>
        <text x="32" y="40" text-anchor="middle" fill="#0b1d33" font-size="18" font-weight="900">5</text>
        <text x="26" y="72" fill="#0b1d33" font-size="22" font-weight="900">Fabricate</text>
        <text x="26" y="99" fill="#657287" font-size="14" font-weight="700">Build approved signs.</text>
      </g>

      <g transform="translate(136 420)">
        <rect width="172" height="118" rx="16" fill="url(#navy)"/>
        <circle cx="32" cy="32" r="19" fill="#d4a843"/>
        <text x="32" y="40" text-anchor="middle" fill="#0b1d33" font-size="18" font-weight="900">6</text>
        <text x="26" y="72" fill="#ffffff" font-size="22" font-weight="900">Install</text>
        <text x="26" y="99" fill="#cfdae8" font-size="14" font-weight="700">Punch and closeout.</text>
      </g>
    </g>
  </g>

  <g transform="translate(112 678)" font-family="Arial, Helvetica, sans-serif">
    <rect width="696" height="34" rx="17" fill="#f5f6f8" stroke="#dfe5ee" stroke-width="2"/>
    <circle cx="19" cy="17" r="7" fill="#d4a843"/>
    <text x="40" y="23" fill="#657287" font-size="15" font-weight="800">The path ends at Install/Closeout. Future scopes start a new package review.</text>
  </g>
</svg>
